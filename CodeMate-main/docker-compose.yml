version: "3.8"

services:
  backend:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/test}
      - JWT_SECRET=${JWT_SECRET:-mysecret123}
      - API_KEY=${API_KEY:-} # Pull from host environment if available

  frontend:
    build:
      context: ./client
      args:
        - VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://localhost:5000/}
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://localhost:5000/}

  mongo:
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: